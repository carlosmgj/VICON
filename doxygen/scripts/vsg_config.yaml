rule:
  # Capitalización de la keyword "architecture" en declaraciones
  architecture_004:
    case: lower

  # Capitalización del nombre de la arquitectura al final: "end architecture X"
  architecture_019:
    case: lower

  # Capitalización de la keyword "architecture" en "end architecture"
  architecture_020:
    case: lower

  # Capitalización de la keyword "entity" en declaraciones
  entity_004:
    case: lower

  # Capitalización de la keyword "entity" en "end entity"
  entity_006:
    case: lower

  # Capitalización de la keyword "case" en sentencias case
  case_014:
    case: lower

  # Capitalización de la keyword "end" en "end case"
  case_015:
    case: lower

  # Capitalización de la keyword "signal" en declaraciones
  signal_002:
    case: lower

  # No permitir asignación por defecto en señales (signal x : tipo := valor)
  signal_007:
    disable: true

  # No exigir instanciación por componente (permitir entity work.X)
  instantiation_034:
    disable: true

  # No exigir identificador de arquitectura en instanciaciones
  instantiation_036:
    disable: true

  # Longitud máxima de línea
  length_001:
    length: 120